<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Spring</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Bright Spring</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"BRIGHT SPRING NEUTRALS",
colors:[
"#FFFDF2",
"#F6EEDB",
"#E9DDC7",
"#D7C6AE",
"#8B8073",
"#5B524E"
]
},

{
title:"LIGHT WARM BASICS",
colors:[
"#F4E8D4",
"#F0DCB3",
"#E8C98A",
"#DDD46A",
"#C0CE62",
"#B6C16A"
]
},

{
title:"CITRUS YELLOWS",
colors:[
"#F9F42A",
"#FFE04A",
"#FFD137",
"#F7C126",
"#EEB63C",
"#E0932D"
]
},

{
title:"CORALS + PEACHES",
colors:[
"#FF8D66",
"#F68A67",
"#F3B59A",
"#ECA38E",
"#FF6F61",
"#FF7B68"
]
},

{
title:"POPPY + TOMATO REDS",
colors:[
"#FF5C50",
"#F25C4A",
"#F04B3A",
"#FF3E4C",
"#FF2E2E",
"#E93C2F"
]
},

{
title:"PINKS + WATERMELONS",
colors:[
"#F07DA2",
"#E35E8E",
"#E54FA0",
"#F25AAF",
"#E2288D",
"#D9398F"
]
},

{
title:"HOT PINKS + SPRING MAGENTAS",
colors:[
"#FF61C7",
"#F254B8",
"#EA45A9",
"#E82F9F",
"#D92498",
"#C93C8C"
]
},

{
title:"YELLOW GREENS + LIME",
colors:[
"#A7C748",
"#98BE42",
"#8DCB2A",
"#49D12F",
"#56C214",
"#63B12E"
]
},

{
title:"BRIGHT GREENS",
colors:[
"#6BB34B",
"#3EB14A",
"#20A353",
"#12A05E",
"#11905F",
"#11834B"
]
},

{
title:"AQUAS + TURQUOISES",
colors:[
"#83D8DF",
"#54B7D0",
"#23B2C6",
"#20A4B0",
"#16D3D8",
"#12C8CE"
]
},

{
title:"BRIGHT BLUES",
colors:[
"#5A9DD4",
"#3B7FC0",
"#1F74B7",
"#1E6CB0",
"#476BDD",
"#2F5EAD"
]
},

{
title:"PERIWINKLES + VIOLETS",
colors:[
"#6C7AC9",
"#575FC1",
"#7A61B0",
"#875EAF"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
