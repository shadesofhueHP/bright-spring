<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Spring</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Bright Spring</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"BRIGHT SPRING NEUTRALS",
colors:[
"#FFFDF2",
"#F6EEDB",
"#E9DDC7",
"#D7C6AE",
"#8B8073",
"#5B524E"
]
},

{
title:"LIGHT WARM BASICS",
colors:[
"#F4E8D4",
"#F0DCB3",
"#E8C98A",
"#E7D66B",
"#C6D45C",
"#AFC663"
]
},

{
title:"CITRUS YELLOWS",
colors:[
"#FFF200",
"#FFE23A",
"#FFD132",
"#F7C226",
"#EEB63C",
"#E49E28"
]
},

{
title:"BRIGHT ORANGE + MANGO",
colors:[
"#FFB347",
"#FFA233",
"#FF8F2B",
"#FF7A1F",
"#F56A1C",
"#E85A1A"
]
},

{
title:"CORALS + WATERMELON",
colors:[
"#FF7B6B",
"#FF6F61",
"#F96863",
"#F45A5A",
"#FF5A7A",
"#F05273"
]
},

{
title:"POPPY + TOMATO REDS",
colors:[
"#FF4B3A",
"#FF3E30",
"#F53B2D",
"#E93C2F",
"#FF2E2E"
]
},

{
title:"BRIGHT PINKS",
colors:[
"#FF5FA2",
"#F55295",
"#EC4588",
"#E4377B",
"#D93275"
]
},

{
title:"LIME + CHARTREUSE",
colors:[
"#B9E329",
"#A7D92A",
"#8FD32F",
"#6EDB2C",
"#52D022",
"#63C731"
]
},

{
title:"BRIGHT GREENS",
colors:[
"#63C64D",
"#3DBE4A",
"#22AF4C",
"#13A85A",
"#0FA260",
"#0E9654"
]
},

{
title:"AQUA + TURQUOISE",
colors:[
"#5ED7D6",
"#3ECED2",
"#27C2C7",
"#17B8BE",
"#0FB0B5",
"#12C8CE"
]
},

{
title:"SPRING BLUES",
colors:[
"#6FB5E3",
"#4DA4DA",
"#2E93D0",
"#1F83C7",
"#2F78C2",
"#3E6FCE"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
